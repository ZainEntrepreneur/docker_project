<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>YouTube Channel Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Card */
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        /* Profile Image */
        .profile img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid red;
        }

        /* Channel Name */
        h1 {
            font-size: 22px;
            margin: 15px 0 5px;
        }

        /* Subtitle */
        p {
            color: gray;
            margin-bottom: 20px;
        }

        /* Subscribe Button */
        .subscribe-btn {
            background: #ff0000;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        .subscribe-btn:hover {
            background: #cc0000;
            transform: scale(1.05);
        }
    </style>

</head>

<body>

    <div class="container">

        <!-- Profile Image -->
        <div class="profile">
            <img src="profile image.png" alt="Profile Picture">
        </div>

        <!-- Channel Name -->
        <h1>Zain Entrepreneur</h1>

        <!-- Username -->
        <p>@zainentrepreneur-pk</p>

        <!-- Subscribe Button -->
        <button class="subscribe-btn">🔴 Subscribe</button>

    </div>

</body>

</html>
